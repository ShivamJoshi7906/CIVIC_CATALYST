<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="whiteBlueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F8FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="whiteTealGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E0F4F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5FBFC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Outer teal arc -->
  <path d="M 25 100 A 75 75 0 0 1 175 100" fill="none" stroke="#E0F4F7" stroke-width="14" stroke-linecap="round"/>
  
  <!-- Inner blue arc -->
  <path d="M 35 100 A 65 65 0 0 0 165 100" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Light hand (left/bottom) -->
  <g opacity="0.7">
    <path d="M 40 130 Q 25 120 20 105" fill="none" stroke="#5DADE2" stroke-width="6" stroke-linecap="round"/>
    <circle cx="18" cy="100" r="4" fill="#5DADE2"/>
  </g>
  
  <!-- Dark hand (right/top pointing) -->
  <g opacity="0.9">
    <path d="M 160 70 Q 175 80 180 95" fill="none" stroke="#0052CC" stroke-width="8" stroke-linecap="round"/>
    <polygon points="180,95 190,85 185,100" fill="#0052CC"/>
  </g>
  
  <!-- Center handshake elements -->
  <ellipse cx="85" cy="105" rx="8" ry="12" fill="#5DADE2" opacity="0.8" transform="rotate(-20 85 105)"/>
  <ellipse cx="115" cy="95" rx="8" ry="12" fill="#0052CC" opacity="0.9" transform="rotate(20 115 95)"/>
  
  <!-- Text paths for circular text -->
  <defs>
    <path id="topArc2" d="M 40,100 A 60,60 0 0,1 160,100" fill="none"/>
    <path id="bottomArc2" d="M 160,100 A 60,60 0 0,1 40,100" fill="none"/>
  </defs>
  
  <!-- Top text: CIVIC CATALYST -->
  <text font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0052CC" letter-spacing="2">
    <textPath href="#topArc2" startOffset="50%" text-anchor="middle">
      CIVIC CATALYST
    </textPath>
  </text>
  
  <!-- Bottom text: SPOT. REPORT. RESOLVE. -->
  <text font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#20B2AA" letter-spacing="1">
    <textPath href="#bottomArc2" startOffset="50%" text-anchor="middle">
      SPOT. REPORT. RESOLVE.
    </textPath>
  </text>
</svg>