{% extends 'theme/base.html' %}

{% block title %}Sign Up | Civic Catalyst{% endblock %}

{% block content %}
    <div class="max-w-lg mx-auto bg-white p-10 rounded shadow">
        <h2 class="text-2xl font-semibold mb-4 text-center text-blue-600">Create New Account</h2>
        <p class="text-center text-sm text-gray-600 mb-4">Public Issue Reporting System</p>

        <form action="#" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" name="fullname" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" name="email" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Mobile Number</label>
                <input type="tel" name="mobile" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" name="confirm_password" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50" />
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">User Type</label>
                <select name="role" required class="mt-1 block w-full border-gray-300 rounded-md px-3 py-2 bg-blue-50">
                    <option value="">Select</option>
                    <option value="citizen">Citizen</option>
                    <option value="staff">Municipal Staff</option>
                    <option value="Administrator">Administrator</option>
                </select>
            </div>

            <div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">Sign Up</button>
            </div>
        </form>

        <p class="text-center text-sm text-gray-600 mt-4">Already have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Login here</a></p>
    </div>
{% endblock %}
