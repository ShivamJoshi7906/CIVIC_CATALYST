{% extends 'theme/base.html' %} {% block title %}Login | Civic Catalyst{%
endblock %} {% block content %}
<div
  class="max-w-lg mx-auto bg-white p-10 rounded shadow min-h-[70vh] flex flex-col justify-center"
>
  <h1 class="text-2xl font-semibold mb-4 text-center text-blue-600">Login</h1>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700">Email</label>
      <input
        type="email"
        name="email"
        placeholder="Enter your email"
        required
        class="mt-1 block w-full border-blue-300 rounded-md px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-black focus:border-black bg-blue-100"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Password</label>
      <input
        type="password"
        name="password"
        placeholder="Enter your password"
        required
        class="mt-1 block w-full border-blue-300 rounded-md px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-black focus:border-black bg-blue-100"
      />
    </div>

    <div class="flex items-center justify-between">
      <a href="#" class="text-sm text-blue-600 hover:underline"
        >Forgot Password?</a
      >
      <a href="{% url 'signup' %}" class="text-sm text-blue-600 hover:underline"
        >Create New Account</a
      >
    </div>

    <div>
      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700"
      >
        Login
      </button>
    </div>
  </form>
</div>
{% endblock %}
