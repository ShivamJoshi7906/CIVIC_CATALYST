services:
  - type: web
    name: civic-catalyst
    runtime: python
    buildCommand: "bash build.sh"
    startCommand: "gunicorn civic.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
